<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fit House — Acceso</title>
  <link rel="stylesheet" href="../css/tokens.css"/>

  <!-- Supabase JS v2 via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    /* ── Layout centrado de login ─────────────────────────────── */
    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
      /* Textura sutil de líneas verticales */
      background-image: repeating-linear-gradient(
        90deg, transparent, transparent 119px,
        rgba(255,255,255,0.012) 120px
      );
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .login-header { text-align: center; }

    .login-headline {
      font-family: var(--font-display);
      font-size: 52px;
      letter-spacing: 0.04em;
      line-height: 0.9;
      margin: 16px 0 8px;
    }

    .login-sub {
      font-size: 13px;
      color: var(--muted);
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .form-group { display: flex; flex-direction: column; }

    /* Error inline */
    #login-error {
      display: none;
      padding: 12px 16px;
      border-radius: var(--radius);
      background: var(--red-dim);
      border: 1px solid rgba(255,23,68,0.3);
      font-size: 13px;
      color: var(--red);
    }

    .login-footer {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }

    /* ── Modal: agendar cita de inscripción ──────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.7);
      align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px 24px;
      max-width: 360px; width: 100%;
    }
    @media (max-width: 420px) {
      .modal-box { padding: 22px 18px; }
    }
  </style>
</head>
<body>

  <div id="toast-container"></div>

  <div class="login-wrap">

    <!-- Logo -->
    <div class="login-header">
      <a href="../index.html" class="logo">FIT<span>.</span>HOUSE</a>
      <h1 class="login-headline">ACCESO<br>AL GYM</h1>
      <p class="login-sub">Inicia sesión para ver tu perfil y código QR de acceso.</p>
    </div>

    <!-- Formulario de email + contraseña -->
    <div class="card">
      <form class="login-form" id="login-form">
        <div id="login-error"></div>

        <div class="form-group">
          <label class="form-label" for="email">Correo electrónico</label>
          <input class="form-input" id="email" type="email" placeholder="tu@correo.com" required autocomplete="email"/>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <input class="form-input" id="password" type="password" placeholder="••••••••" required autocomplete="current-password"/>
        </div>

        <button class="btn btn-primary" type="submit" id="login-btn">
          Entrar →
        </button>
      </form>
    </div>

    <div class="login-footer">
      ¿Problemas para acceder? Visita recepción o escríbenos por
      <a href="https://wa.me/TU_NUMERO" target="_blank" style="color:var(--accent)">WhatsApp</a>.
    </div>

    <button class="btn btn-ghost" type="button" id="btn-abrir-inscripcion" style="margin-top:8px">
      ¿Eres nuevo? Inscríbete aquí →
    </button>

  </div>

  <!-- Modal: agendar cita de inscripción -->
  <div class="modal-overlay" id="modal-inscripcion">
    <div class="modal-box">
      <h3 style="font-family:var(--font-display);font-size:22px;margin-bottom:6px">INSCRIPCIÓN</h3>
      <p style="font-size:13px;color:var(--muted);margin-bottom:20px">
        Indícanos tu nombre, día y hora en la que vendrás a inscribirte, para que recepción te esté esperando.
      </p>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="form-group">
          <label class="form-label">Tu nombre</label>
          <input class="form-input" type="text" id="inscripcion-nombre" placeholder="Nombre completo"/>
        </div>
        <div class="form-group">
          <label class="form-label">Tu correo</label>
          <input class="form-input" type="email" id="inscripcion-correo" placeholder="tu@correo.com"/>
        </div>
        <div style="display:flex;gap:10px">
          <div class="form-group" style="flex:1">
            <label class="form-label">Fecha</label>
            <input class="form-input" type="date" id="inscripcion-fecha"/>
          </div>
          <div class="form-group" style="flex:1">
            <label class="form-label">Hora</label>
            <input class="form-input" type="time" id="inscripcion-hora"/>
          </div>
        </div>
        <p id="inscripcion-error" style="display:none;color:var(--red);font-size:12px"></p>
        <button class="btn btn-primary" id="btn-confirmar-inscripcion">Confirmar cita</button>
        <button class="btn btn-ghost btn-sm" id="btn-cerrar-inscripcion">Cancelar</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { getClient, toast } from '../js/supabase-client.js';

    const sb        = getClient();
    const form      = document.getElementById('login-form');
    const loginBtn  = document.getElementById('login-btn');
    const errorBox  = document.getElementById('login-error');

    // ── Helpers de UI ───────────────────────────────────────────
    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.style.display = 'block';
    }
    function clearError() { errorBox.style.display = 'none'; }

    function setLoading(btn, loading) {
      btn.disabled = loading;
      btn.textContent = loading ? 'Cargando...' : btn.dataset.label;
    }

    loginBtn.dataset.label = 'Entrar →';

    // ── Redirigir si ya hay sesión activa ───────────────────────
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'app.html';
    });

    // ── Login con email + contraseña ────────────────────────────
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      setLoading(loginBtn, true);

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        showError('Correo o contraseña incorrectos. Intenta de nuevo.');
        setLoading(loginBtn, false);
        return;
      }

      // Redirigir a la app principal
      window.location.href = 'app.html';
    });

    // ── Modal: agendar cita de inscripción ──────────────────────
    const modalInscripcion = document.getElementById('modal-inscripcion');

    document.getElementById('btn-abrir-inscripcion').addEventListener('click', () => {
      modalInscripcion.style.display = 'flex';
    });
    document.getElementById('btn-cerrar-inscripcion').addEventListener('click', () => {
      modalInscripcion.style.display = 'none';
    });

    document.getElementById('btn-confirmar-inscripcion').addEventListener('click', async () => {
      const nombre = document.getElementById('inscripcion-nombre').value.trim();
      const correo = document.getElementById('inscripcion-correo').value.trim();
      const fecha  = document.getElementById('inscripcion-fecha').value;
      const hora   = document.getElementById('inscripcion-hora').value;
      const errBox = document.getElementById('inscripcion-error');
      errBox.style.display = 'none';

      if (!nombre || !correo || !fecha || !hora) {
        errBox.textContent = 'Completa tu nombre, correo, fecha y hora.';
        errBox.style.display = 'block';
        return;
      }

      // Combinamos fecha + hora en un solo valor (ej. "2026-07-01T15:30")
      const fechaHora = `${fecha}T${hora}:00`;

      // No requiere sesión: cualquiera puede agendar su cita de
      // inscripción (política RLS "cualquiera_puede_agendar_cita").
      const { error } = await sb.from('citas').insert({
        tipo: 'inscripcion',
        nombre,
        correo,
        fecha_cita: fechaHora,
        miembro_id: null
      });

      if (error) {
        errBox.textContent = 'No se pudo agendar: ' + error.message;
        errBox.style.display = 'block';
        return;
      }

      modalInscripcion.style.display = 'none';
      toast('Cita agendada. Te esperamos ese día en recepción.', 'success');
    });
  </script>
</body>
</html>
