<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fit House — Acceso</title>
  <link rel="stylesheet" href="../css/tokens.css"/>

  <!-- Supabase JS v2 via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    /* ── Layout centrado de login ─────────────────────────────── */
    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
      /* Textura sutil de líneas verticales */
      background-image: repeating-linear-gradient(
        90deg, transparent, transparent 119px,
        rgba(255,255,255,0.012) 120px
      );
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .login-header { text-align: center; }

    .login-headline {
      font-family: var(--font-display);
      font-size: 52px;
      letter-spacing: 0.04em;
      line-height: 0.9;
      margin: 16px 0 8px;
    }

    .login-sub {
      font-size: 13px;
      color: var(--muted);
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .form-group { display: flex; flex-direction: column; }

    /* Separador "o" entre métodos */
    .sep {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
      color: var(--muted);
      font-family: var(--font-mono);
    }
    .sep::before, .sep::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Error inline */
    #login-error {
      display: none;
      padding: 12px 16px;
      border-radius: var(--radius);
      background: var(--red-dim);
      border: 1px solid rgba(255,23,68,0.3);
      font-size: 13px;
      color: var(--red);
    }

    /* Magic link message */
    #magic-msg {
      display: none;
      padding: 16px;
      border-radius: var(--radius);
      background: var(--green-dim);
      border: 1px solid rgba(0,230,118,0.25);
      font-size: 13px;
      color: var(--green);
      text-align: center;
      line-height: 1.6;
    }

    .login-footer {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <div id="toast-container"></div>

  <div class="login-wrap">

    <!-- Logo -->
    <div class="login-header">
      <a href="../index.html" class="logo">FIT<span>.</span>HOUSE</a>
      <h1 class="login-headline">ACCESO<br>AL GYM</h1>
      <p class="login-sub">Inicia sesión para ver tu perfil y código QR de acceso.</p>
    </div>

    <!-- Formulario de email + contraseña -->
    <div class="card">
      <form class="login-form" id="login-form">
        <div id="login-error"></div>

        <div class="form-group">
          <label class="form-label" for="email">Correo electrónico</label>
          <input class="form-input" id="email" type="email" placeholder="tu@correo.com" required autocomplete="email"/>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <input class="form-input" id="password" type="password" placeholder="••••••••" required autocomplete="current-password"/>
        </div>

        <button class="btn btn-primary" type="submit" id="login-btn">
          Entrar →
        </button>

        <div class="sep">ó</div>

        <button class="btn btn-ghost" type="button" id="magic-btn">
          Enviarme link mágico al correo
        </button>

        <div id="magic-msg">
          📬 Revisa tu bandeja de entrada.<br>
          Te enviamos un enlace de acceso seguro.<br>
          <span style="color:var(--muted)">Puedes cerrar esta pestaña.</span>
        </div>
      </form>
    </div>

    <div class="login-footer">
      ¿Problemas para acceder? Visita recepción o escríbenos por
      <a href="https://wa.me/TU_NUMERO" target="_blank" style="color:var(--accent)">WhatsApp</a>.
    </div>

  </div>

  <script type="module">
    import { getClient, toast } from '../js/supabase-client.js';

    const sb        = getClient();
    const form      = document.getElementById('login-form');
    const loginBtn  = document.getElementById('login-btn');
    const magicBtn  = document.getElementById('magic-btn');
    const errorBox  = document.getElementById('login-error');
    const magicMsg  = document.getElementById('magic-msg');

    // ── Helpers de UI ───────────────────────────────────────────
    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.style.display = 'block';
    }
    function clearError() { errorBox.style.display = 'none'; }

    function setLoading(btn, loading) {
      btn.disabled = loading;
      btn.textContent = loading ? 'Cargando...' : btn.dataset.label;
    }

    loginBtn.dataset.label = 'Entrar →';
    magicBtn.dataset.label = 'Enviarme link mágico al correo';

    // ── Redirigir si ya hay sesión activa ───────────────────────
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'app.html';
    });

    // ── Login con email + contraseña ────────────────────────────
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      setLoading(loginBtn, true);

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        showError('Correo o contraseña incorrectos. Intenta de nuevo.');
        setLoading(loginBtn, false);
        return;
      }

      // Redirigir a la app principal
      window.location.href = 'app.html';
    });

    // ── Magic Link (sin contraseña) ─────────────────────────────
    magicBtn.addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      if (!email) { showError('Escribe tu correo primero.'); return; }

      clearError();
      setLoading(magicBtn, true);

      const { error } = await sb.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: window.location.origin + '/pages/app.html' }
      });

      setLoading(magicBtn, false);

      if (error) {
        showError('No se pudo enviar el link. Verifica el correo e intenta de nuevo.');
        return;
      }

      magicMsg.style.display = 'block';
      magicBtn.style.display = 'none';
    });
  </script>
</body>
</html>
