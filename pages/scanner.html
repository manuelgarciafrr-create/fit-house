<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fit House — Escáner de Acceso</title>
  <link rel="stylesheet" href="../css/tokens.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- html5-qrcode: accede a la cámara y decodifica QRs en tiempo real -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }

    header {
      background: rgba(10,10,10,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }

    .scanner-shell {
      max-width: 600px; margin: 0 auto;
      padding: 40px 24px;
      display: flex; flex-direction: column; gap: 24px;
    }

    /* ── Viewfinder ─────────────────────────────────────────── */
    #reader {
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 2px solid var(--border);
      background: var(--surface);
      min-height: 300px;
      position: relative;
    }

    /* Escaneo manual (en dispositivos sin cámara / testing) */
    .manual-section {
      display: flex; flex-direction: column; gap: 12px;
    }

    /* ── Panel de resultado ─────────────────────────────────── */
    #result-panel {
      display: none;
      padding: 32px;
      border-radius: var(--radius-lg);
      text-align: center;
      border: 2px solid var(--border);
      transition: border-color 0.3s ease;
    }

    #result-panel.success { border-color: var(--green); background: var(--green-dim); }
    #result-panel.error   { border-color: var(--red);   background: var(--red-dim);   }

    .result-icon { font-size: 56px; margin-bottom: 16px; }

    .result-title {
      font-family: var(--font-display);
      font-size: 36px; letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    .result-msg  { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
    .result-name { font-size: 20px; font-weight: 600; color: var(--white); margin-bottom: 4px; }

    /* Log de accesos recientes */
    .log-title {
      font-family: var(--font-mono);
      font-size: 10px; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 12px;
    }

    .log-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }

    .log-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); font-size: 13px;
    }

    .log-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .log-time { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-left: auto; }
  </style>
</head>
<body>

  <div id="toast-container"></div>

  <header>
    <a href="../index.html" class="logo">FIT<span>.</span>HOUSE</a>
    <span style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;color:var(--accent)">
      ESCÁNER DE ACCESO
    </span>
  </header>

  <div class="scanner-shell">

    <div>
      <div class="eyebrow">Control de entrada</div>
      <h1 style="font-family:var(--font-display);font-size:42px;letter-spacing:0.04em">
        LECTOR QR
      </h1>
      <p style="font-size:13px;color:var(--muted);margin-top:6px">
        Apunta la cámara al código QR del atleta. El acceso se registra automáticamente.
      </p>
    </div>

    <!-- Viewfinder de cámara -->
    <div id="reader"></div>

    <!-- Ingreso manual (testing / backup) -->
    <div class="card manual-section">
      <div class="eyebrow">O ingresa el payload manualmente</div>
      <div style="display:flex;gap:10px">
        <input class="form-input" id="manual-input" placeholder="FH:uuid|ventana|firma" style="flex:1"/>
        <button class="btn btn-primary" id="manual-btn">Verificar</button>
      </div>
    </div>

    <!-- Panel de resultado -->
    <div id="result-panel">
      <div class="result-icon" id="result-icon">—</div>
      <div class="result-name" id="result-name"></div>
      <div class="result-title" id="result-title">—</div>
      <div class="result-msg"   id="result-msg"></div>
      <button class="btn btn-ghost btn-sm" id="reset-btn">← Escanear otro</button>
    </div>

    <!-- Log de accesos recientes en la sesión -->
    <div class="card">
      <div class="log-title">Accesos registrados hoy</div>
      <ul class="log-list" id="log-list">
        <li style="font-size:13px;color:var(--muted);text-align:center;padding:12px">
          Sin registros aún en esta sesión.
        </li>
      </ul>
    </div>

  </div>

  <script type="module">
    import { getClient, getSession, validarPayloadQR, toast } from '../js/supabase-client.js';

    const sb = getClient();

    // ── Auth guard (solo admins pueden usar el escáner) ──────────
    const session = await getSession();
    if (!session) { window.location.href = 'login.html'; }

    // ── Estado del escáner ───────────────────────────────────────
    let procesando = false;   // evita procesar múltiples frames simultáneos
    const accessLog = [];     // log local de esta sesión

    // ── Iniciar html5-qrcode ─────────────────────────────────────
    // onScanSuccess se llama cada vez que la cámara detecta un QR válido.
    const html5QrCode = new Html5Qrcode('reader');

    html5QrCode.start(
      { facingMode: 'environment' },   // cámara trasera
      { fps: 10, qrbox: { width: 240, height: 240 } },
      onScanSuccess,
      () => {}   // ignorar errores de frame (son frecuentes)
    ).catch(() => {
      document.getElementById('reader').innerHTML =
        '<div style="padding:40px;text-align:center;color:var(--muted)">Cámara no disponible — usa ingreso manual.</div>';
    });

    // ── Procesar QR escaneado ────────────────────────────────────
    async function onScanSuccess(decodedText) {
      if (procesando) return;     // debounce
      procesando = true;

      await procesarPayload(decodedText);

      // Reanudar escaneo después de 4 segundos
      setTimeout(() => { procesando = false; }, 4000);
    }

    // ── Lógica central de validación y registro ──────────────────
    // 1. Valida el payload QR (firma + expiración)
    // 2. Llama a la función SQL registrar_asistencia()
    //    que verifica: membresía activa + no ingresó hoy
    // 3. Muestra resultado en el panel

    async function procesarPayload(payload) {
      mostrarResultado('loading');

      // Paso 1: Validar payload localmente (anti-fraude)
      const userId = validarPayloadQR(payload);

      if (!userId) {
        mostrarResultado('error', {
          icon: '⛔',
          title: 'QR INVÁLIDO',
          msg: 'El código expiró o fue modificado. Pide al atleta que muestre su QR actualizado.',
          nombre: ''
        });
        return;
      }

      // Paso 2: Llamar a la función segura en Supabase
      // La función verifica membresía activa + unicidad diaria + inserta asistencia
      const { data, error } = await sb.rpc('registrar_asistencia', {
        p_user_id: userId
      });

      if (error || !data) {
        mostrarResultado('error', {
          icon: '❌',
          title: 'ERROR',
          msg: 'No se pudo conectar con el servidor. Verifica la conexión.',
          nombre: ''
        });
        return;
      }

      if (!data.ok) {
        // Distinguir tipos de error
        const esYaIngreso = data.error?.includes('ya ingresó');
        mostrarResultado('error', {
          icon: esYaIngreso ? '🔁' : '🚫',
          title: esYaIngreso ? 'YA INGRESÓ HOY' : 'ACCESO DENEGADO',
          msg: data.error,
          nombre: ''
        });
        return;
      }

      // Paso 3: Éxito — obtener nombre del atleta para mostrarlo
      const { data: miembro } = await sb
        .from('miembros_gym')
        .select('nombre')
        .eq('id', userId)
        .single();

      const nombre = miembro?.nombre ?? 'Atleta';

      // Paso 4: Acceso concedido de verdad — crear un comando de apertura.
      // Solo se llega aquí si registrar_asistencia() confirmó membresía
      // activa y que no había ingresado hoy. En cualquier camino de error
      // de arriba, esta línea nunca se ejecuta y la puerta permanece cerrada.
      //
      // En vez de llamar directo al ESP32 (lo cual exigiría que este
      // dispositivo esté en la misma red WiFi local que el ESP32),
      // insertamos un "comando pendiente" en Supabase. El ESP32, conectado
      // a su propio WiFi con internet, lo detecta en segundos y abre la
      // puerta. Así el scanner puede estar en cualquier red.
      try {
        await sb.from('comandos_puerta').insert({ origen: 'scanner_qr' });
      } catch (errPuerta) {
        // No bloqueamos el acceso si esto falla — el admin puede abrir
        // manual desde admin.html si hace falta.
        console.warn('No se pudo registrar el comando de apertura:', errPuerta);
      }

      mostrarResultado('success', {
        icon: '✅',
        title: '¡ACCESO CONCEDIDO!',
        msg: data.mensaje,
        nombre
      });

      // Agregar al log local
      agregarLog(nombre, true);
    }

    // ── Render del panel de resultado ────────────────────────────
    function mostrarResultado(tipo, data = {}) {
      const panel = document.getElementById('result-panel');

      if (tipo === 'loading') {
        panel.style.display = 'block';
        panel.className = '';
        panel.querySelector?.('*');
        document.getElementById('result-icon').textContent  = '⏳';
        document.getElementById('result-name').textContent  = '';
        document.getElementById('result-title').textContent = 'Verificando...';
        document.getElementById('result-msg').textContent   = '';
        return;
      }

      panel.style.display = 'block';
      panel.className = tipo;   // 'success' o 'error'

      document.getElementById('result-icon').textContent  = data.icon;
      document.getElementById('result-name').textContent  = data.nombre;
      document.getElementById('result-title').textContent = data.title;
      document.getElementById('result-msg').textContent   = data.msg;
    }

    // ── Log visual de accesos ────────────────────────────────────
    function agregarLog(nombre, exitoso) {
      const ahora = new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
      accessLog.unshift({ nombre, exitoso, hora: ahora });

      const list = document.getElementById('log-list');

      // Limpiar placeholder
      if (accessLog.length === 1) list.innerHTML = '';

      const li = document.createElement('li');
      li.className = 'log-item';
      li.innerHTML = `
        <span class="log-dot" style="background:${exitoso ? 'var(--green)' : 'var(--red)'}"></span>
        <span>${nombre}</span>
        <span style="font-size:12px;color:${exitoso ? 'var(--green)' : 'var(--red)'}">
          ${exitoso ? 'Entrada registrada' : 'Denegado'}
        </span>
        <span class="log-time">${ahora}</span>
      `;
      list.prepend(li);

      // Mantener máximo 20 entradas en el log
      if (list.children.length > 20) list.lastChild.remove();
    }

    // ── Botón reset ──────────────────────────────────────────────
    document.getElementById('reset-btn').addEventListener('click', () => {
      document.getElementById('result-panel').style.display = 'none';
      procesando = false;
    });

    // ── Ingreso manual ───────────────────────────────────────────
    document.getElementById('manual-btn').addEventListener('click', async () => {
      const val = document.getElementById('manual-input').value.trim();
      if (!val) return;
      await procesarPayload(val);
    });

    document.getElementById('manual-input').addEventListener('keydown', async (e) => {
      if (e.key === 'Enter') {
        const val = document.getElementById('manual-input').value.trim();
        if (val) await procesarPayload(val);
      }
    });
  </script>
</body>
</html>
